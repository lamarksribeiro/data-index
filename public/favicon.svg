<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100" width="100%" height="100%">
  <defs>
    <!-- Gradiente Laranja/Dourado (Data Runner) -->
    <linearGradient id="gradTop" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#fbbf24" />
      <stop offset="100%" stop-color="#f97316" />
    </linearGradient>

    <!-- Gradiente Roxo/Violeta (Data Gecko) -->
    <linearGradient id="gradLeft" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#c084fc" />
      <stop offset="100%" stop-color="#8b5cf6" />
    </linearGradient>

    <!-- Gradiente Verde (Data Robot) -->
    <linearGradient id="gradRight" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#34d399" />
      <stop offset="100%" stop-color="#059669" />
    </linearGradient>
  </defs>

  <!-- Cubo Isométrico Geométrico Maximizado (Preenche toda a área útil 96%) -->
  <!-- Face do Topo (Verde / Data Robot / Lucro no topo) -->
  <polygon points="50,2 98,26 50,50 2,26" fill="url(#gradRight)" />
  
  <!-- Face da Esquerda (Roxo / Data Gecko / Coleta na sustentação esquerda) -->
  <polygon points="2,26 50,50 50,98 2,74" fill="url(#gradLeft)" />
  
  <!-- Face da Direita (Laranja / Data Backtest / Simulação na sustentação direita) -->
  <polygon points="50,50 98,26 98,74 50,98" fill="url(#gradTop)" />
  
  <!-- Linhas Divisórias de Contraste e Profundidade -->
  <path d="M 50,50 L 50,98 M 50,50 L 2,26 M 50,50 L 98,26" fill="none" stroke="#04070f" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round" opacity="0.45" />
</svg>
